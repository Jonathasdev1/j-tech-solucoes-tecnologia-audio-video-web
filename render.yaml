services:
  - type: web
    name: jtech-loja
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /index.php
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
